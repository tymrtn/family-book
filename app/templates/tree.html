{% extends "base.html" %}
{% block title %}{{ t('tree.title') }} — {{ t('app.name') }}{% endblock %}
{% block head %}
<style>.page { padding-top: var(--nav-h); padding-bottom: 0; }</style>
{% endblock %}

{% block content %}
<div class="tree-page" id="tree-page">
  <div class="tree-controls">
    <button onclick="treeZoomIn()" title="{{ t('tree.zoom_in') }}">+</button>
    <button onclick="treeZoomOut()" title="{{ t('tree.zoom_out') }}">&minus;</button>
    <button onclick="treeReset()" title="{{ t('tree.reset_view') }}">↺</button>
  </div>

  <svg id="tree-svg"></svg>

  <!-- Hover tooltip -->
  <div class="tree-tooltip" id="tree-tooltip">
    <div class="tree-tooltip__name"></div>
    <div class="tree-tooltip__year"></div>
  </div>

  <div class="person-sidebar" id="person-sidebar">
    <button class="person-sidebar__close" onclick="closeSidebar()">&times;</button>
    <div id="sidebar-content"></div>
  </div>
</div>
{# Pass config to tree.js #}
<script>
  window.TREE_CONFIG = {
    apiUrl: '{{ "/demo/api/tree" if demo_mode else "/api/tree" }}',
    personBaseUrl: '{{ "/demo/people" if demo_mode else "/people" }}',
    demoMode: {{ "true" if demo_mode else "false" }}
  };
</script>
{% endblock %}

{% block scripts %}
<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="/static/js/tree.js"></script>
{% endblock %}
