{% for c in comments %}
<div class="comment" id="comment-{{ c.id }}">
  <div class="avatar avatar--sm">{{ c.person_name[:2] }}</div>
  <div class="comment__body">
    <span class="comment__name">{{ c.person_name }}</span>
    <span class="comment__text">{{ c.body }}</span>
    <span class="comment__time">{{ c.created_at[:10] if c.created_at else '' }}</span>
  </div>
</div>
{% endfor %}
{% if not comments %}
<p class="text-sm text-muted" style="padding:4px 0; font-style:italic;">No comments yet</p>
{% endif %}

<form class="comment-form" onsubmit="postComment(event, '{{ moment_id }}')">
  <input type="text" name="body" placeholder="Add a comment..." required autocomplete="off">
  <button type="submit">Send</button>
</form>
