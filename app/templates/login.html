<!DOCTYPE html>
<html lang="{{ locale }}" dir="ltr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ t('auth.login') }} — {{ t('app.name') }}</title>
  <link rel="stylesheet" href="/static/css/main.css">
  <meta name="theme-color" content="#faf8f5">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div style="text-align:center; margin-bottom: 8px; font-size: 2.5rem;">🌳</div>
      <h1 class="auth-card__title">{{ t('app.name') }}</h1>
      <p class="auth-card__subtitle">{{ t('app.tagline') }}</p>

      <form id="magic-link-form" onsubmit="requestMagicLink(event)">
        <div class="form-group">
          <label for="email">{{ t('auth.magic_link') }}</label>
          <input type="email" id="email" name="email" class="form-input"
                 placeholder="{{ t('auth.email_placeholder') }}" required autocomplete="email">
        </div>
        <button type="submit" class="btn btn--primary btn--block btn--lg" id="magic-link-btn">
          {{ t('auth.magic_link') }}
        </button>
      </form>

      <div id="magic-link-success" class="hidden" style="text-align:center; padding: 24px 0;">
        <p style="font-size: 2rem; margin-bottom: 12px;">✉️</p>
        <p style="font-family: var(--font-serif); font-size: 1.1rem; color: var(--brown-dark);">Check your email</p>
        <p class="text-sm text-muted mt-8">{{ t('auth.check_email') }}</p>
      </div>

      {% if fb_enabled %}
      <div class="auth-card__divider">or</div>
      <a href="/auth/facebook" class="btn btn--secondary btn--block btn--lg">
        {{ t('auth.login_with_facebook') }}
      </a>
      {% endif %}

      <div style="margin-top: 28px; text-align: center;">
        <a href="/demo" style="color: var(--text-muted); font-size: 0.9rem; font-weight: 500;">
          ✨ Explore the demo family
        </a>
      </div>
    </div>
  </div>

  <script>
    async function requestMagicLink(e) {
      e.preventDefault();
      const btn = document.getElementById('magic-link-btn');
      const email = document.getElementById('email').value;
      btn.disabled = true;
      btn.textContent = '{{ t("common.loading") }}';
      try {
        const resp = await fetch('/auth/magic-link', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({email})
        });
        if (resp.ok) {
          document.getElementById('magic-link-form').classList.add('hidden');
          document.getElementById('magic-link-success').classList.remove('hidden');
        }
      } catch(err) {
        btn.disabled = false;
        btn.textContent = '{{ t("auth.magic_link") }}';
      }
    }
  </script>
</body>
</html>
